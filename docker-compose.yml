services:

  backend:
    build: ./backend
    container_name: ges-backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: ges-nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
